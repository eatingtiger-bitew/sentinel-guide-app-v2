<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>哨兵嚮導原型 v0.7</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #111; color: #eee; padding: 0; margin: 0; }
  .content-wrap { padding: 16px; max-width: 480px; margin: auto; padding-bottom: 80px; }
  .card { background: #1e1e1e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  h2 { margin-top: 0; font-size: 18px; }
  .bar-row { margin: 8px 0; }
  .bar-label { font-size: 13px; color: #aaa; display: flex; justify-content: space-between; }
  .bar-bg { background: #333; border-radius: 6px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; background: #7aa2f7; transition: width 0.3s; }
  .bar-fill.quest { background: #6cbf7f; }
  button { background: #2b2b3d; color: #eee; border: none; padding: 10px 14px; border-radius: 8px; margin-right: 8px; margin-top: 10px; cursor: pointer; }
  button:hover { background: #3b3b52; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #timeline-list { font-size: 14px; color: #ccc; padding-left: 18px; }
  .quest-status { font-size: 13px; color: #6cbf7f; margin-top: 6px; }
  .clue-list { list-style: none; padding: 0; margin: 10px 0 0 0; }
  .clue-list li { font-size: 14px; padding: 6px 0; border-bottom: 1px solid #2a2a2a; color: #666; }
  .clue-list li.found { color: #eee; }
  .clue-list li.found::before { content: "✓ "; color: #6cbf7f; }
  .clue-list li:not(.found)::before { content: "? "; color: #555; }
  #story-box { min-height: 60px; font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
  #ai-input { width: 100%; box-sizing: border-box; background: #2b2b3d; color: #eee; border: none; border-radius: 8px; padding: 10px; font-size: 14px; margin-top: 8px; }
  .loading { color: #888; font-size: 13px; }
  #create-screen input, #create-screen select { width: 100%; box-sizing: border-box; background: #2b2b3d; color: #eee; border: none; border-radius: 8px; padding: 10px; font-size: 14px; margin-top: 8px; margin-bottom: 10px; }
  .field-label { font-size: 13px; color: #aaa; }
  .player-tag { font-size: 13px; color: #888; margin-top: -4px; margin-bottom: 10px; }
  #game-screen { display: none; }

  .mini-quest-bar { margin-bottom: 14px; }
  .mini-quest-label { font-size: 12px; color: #999; display: flex; justify-content: space-between; margin-bottom: 4px; }
  .mini-bar-bg { background: #333; border-radius: 4px; height: 4px; overflow: hidden; }
  .mini-bar-fill { height: 100%; background: #6cbf7f; transition: width 0.3s; }
  .badge-dot { display: inline-block; width: 6px; height: 6px; background: #e05a5a; border-radius: 50%; margin-left: 4px; vertical-align: middle; }

  /* 分頁籤 */
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; display: flex; border-top: 1px solid #2a2a2a; max-width: 480px; margin: auto; }
  .tab-btn { flex: 1; text-align: center; padding: 14px 0; color: #777; font-size: 13px; background: none; border: none; border-radius: 0; margin: 0; cursor: pointer; }
  .tab-btn.active { color: #7aa2f7; font-weight: bold; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
</style>
</head>
<body>

<div id="create-screen">
  <div class="content-wrap">
    <div class="card">
      <h2>創建角色</h2>
      <p style="color:#888; font-size:13px;">B 級嚮導・嚮導學院應屆畢業生，資質被視為平凡，直到某日「塔」發布通知——顧承夜指名要見你。</p>
      <div class="field-label">姓名</div>
      <input id="player-name" type="text" placeholder="請輸入你的名字">
      <div class="field-label">性別</div>
      <select id="player-gender">
        <option value="male">男</option>
        <option value="female">女</option>
        <option value="other">其他 / 不指定</option>
      </select>
      <button onclick="createPlayer()">開始遊戲</button>
    </div>
  </div>
</div>

<div id="game-screen">
  <div class="content-wrap">

    <div class="card">
      <h2 id="player-header"></h2>
      <div class="player-tag">B 級嚮導・嚮導學院應屆畢業生</div>
    </div>

    <!-- 劇情分頁 -->
    <div class="tab-panel active" id="tab-story">
      <div class="card">
        <h2>劇情</h2>
        <div id="mini-quest-bar"></div>
        <div id="mini-case-card"></div>
        <div id="story-box">輸入你想做的事,故事會從這裡展開。</div>
        <input id="ai-input" type="text" placeholder="例如：我想去找顧承夜討論案情">
        <button onclick="sendToAI()">送出</button>
        <div id="ai-status"></div>
      </div>
    </div>

    <!-- 角色分頁 -->
    <div class="tab-panel" id="tab-npc">
      <div id="npc-cards"></div>
    </div>

    <!-- 任務分頁 -->
    <div class="tab-panel" id="tab-quest">
      <div id="quest-card"></div>
      <div id="case-card"></div>
    </div>

    <!-- 年表分頁 -->
    <div class="tab-panel" id="tab-timeline">
      <div class="card">
        <h2>世界年表</h2>
        <ol id="timeline-list"></ol>
      </div>
    </div>

  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('story', this)">劇情<span id="story-badge" class="badge-dot" style="display:none;"></span></button>
    <button class="tab-btn" onclick="switchTab('npc', this)">角色</button>
    <button class="tab-btn" onclick="switchTab('quest', this)">任務<span id="quest-badge" class="badge-dot" style="display:none;"></span></button>
    <button class="tab-btn" onclick="switchTab('timeline', this)">年表</button>
  </div>
</div>

<script src="config.js"></script>
<script>
const GEMINI_MODEL = "gemini-2.5-flash";

// AI 是否正在生成中，用來擋掉結案／送出按鈕被連點造成重複請求
let isGenerating = false;

// 最近劇情記錄：讓 AI 能看到前幾輪發生了什麼，避免代名詞（他/她）指涉錯誤
// 保留輪數是刻意設限的，避免每次呼叫送出的內容無限累積、拖慢速度增加成本
const MAX_RECENT_TURNS = 3;
let recentStoryLog = [];

let day = 1;
let timeline = [];
let caseClosed = false;

let player = {
  name: "",
  gender: "male",
  guideRank: "B",
  background: "嚮導學院應屆畢業生，資質被認為平凡，直到被S級哨兵顧承夜指名調任"
};

let quests = [
  {
    id: "quest_001",
    title: "異常精神波事件調查案",
    type: "main",
    status: "active",
    progress: 0,
    maxProgress: 8
  }
];

// 目前只有一條主線任務，這個工具函式先集中管理「誰是主線」，
// 之後 8.3 若要支援多主線／支線觸發，只需要改這裡的判斷邏輯
function getMainQuest() {
  return quests.find(q => q.type === "main");
}

// 「目前真正在跑的任務」：有進行中的支線就優先算支線，
// 否則主線還沒完成就算主線，兩者都沒有就回傳 null（代表現在沒有可推進的任務）
function getActiveQuest() {
  const activeSide = quests.find(q => q.type === "side" && q.status === "active");
  if (activeSide) return activeSide;
  const mainQuest = getMainQuest();
  if (mainQuest && mainQuest.status === "active") return mainQuest;
  return null;
}

// 任務進度是否有未讀更新，控制任務分頁籤的紅點提示
let questUpdatedFlag = false;

// 劇情是否有未讀更新（目前只用在：心動事件在其他分頁被觸發時，提示玩家回劇情分頁看）
let storyUpdatedFlag = false;

// 依 id 更新任務進度，並在達標時自動標記完成
// 只有「進度或狀態真的變了」才亮紅點提示，避免對已完成任務加分時憑空亮紅點卻沒有任何實際變化
function updateQuestProgress(questId, amount) {
  const q = quests.find(q => q.id === questId);
  if (!q) return;
  const oldProgress = q.progress;
  const oldStatus = q.status;
  q.progress = Math.max(0, Math.min(q.maxProgress, q.progress + amount));
  if (q.progress >= q.maxProgress) {
    q.status = "completed";
  }
  if (q.progress !== oldProgress || q.status !== oldStatus) {
    questUpdatedFlag = true;
  }
}

// 觸發新支線的規則（系統把關，AI不可自行決定）：
// 主線任務必須已完成，且目前不能有另一條進行中的支線，避免任務無限堆疊
function canTriggerNewQuest() {
  const mainQuest = getMainQuest();
  if (!mainQuest || mainQuest.status !== "completed") return false;
  const hasActiveSide = quests.some(q => q.type === "side" && q.status === "active");
  return !hasActiveSide;
}

// 新增支線任務：id 一律由系統排號，AI只需提供標題與建議完成長度
function addNewQuest(title, maxProgress) {
  if (!canTriggerNewQuest()) {
    console.warn('拒絕觸發新任務：主線尚未完成，或已有進行中的支線');
    return false;
  }
  if (typeof title !== 'string' || !title.trim()) {
    console.warn('拒絕觸發新任務：標題為空', title);
    return false;
  }
  let mp = Number(maxProgress);
  if (!Number.isFinite(mp) || mp < 3 || mp > 10) {
    mp = 5; // AI給的數字不合理時，系統給一個安全的預設值
  }
  quests.push({
    id: `quest_${quests.length + 1}`,
    title: title.trim(),
    type: "side",
    status: "active",
    progress: 0,
    maxProgress: mp
  });
  questUpdatedFlag = true;
  return true;
}

let caseFile = {
  title: "案件調查：異常精神波事件",
  clues: [
    { title: "現場遺留的精神殘留波紋", found: false },
    { title: "受害者最後聯絡紀錄", found: false },
    { title: "目擊者描述的黑影特徵", found: false },
    { title: "塔內部的異常任務派遣紀錄", found: false }
  ]
};

let npcs = {
  guchengye: {
    name: "顧承夜",
    role: "S 級哨兵・特勤隊長",
    trust: 15, respect: 30, attraction: 5, dependence: 0,
    canRomance: true, loveEventTriggered: false
  },
  qinyao: {
    name: "秦曜",
    role: "哨兵",
    trust: 10, respect: 60, attraction: 5, dependence: 0,
    canRomance: true, loveEventTriggered: false
  }
};

// 心動事件觸發門檻：某位可攻略角色的 attraction 達到這個值時，觸發一次專屬過場劇情
const LOVE_EVENT_THRESHOLD = 30;

// 記錄「本次是否有心動事件正在等待觸發」
// 用途：AI 呼叫過程中(sendToAI 尚未跑完)不能馬上再發起一次新的 AI 請求，
// 所以先記下來，等目前的 AI 呼叫完全結束、isGenerating 恢復 false 之後再觸發
let pendingLoveEvent = null;

// 心動事件判斷（系統把關，AI 不可自行決定）：
// 只有 canRomance 為 true、且尚未觸發過的角色，attraction 達標時才標記待觸發
function checkLoveEventTrigger(npcId) {
  const npc = npcs[npcId];
  if (!npc || !npc.canRomance || npc.loveEventTriggered) return;
  if (npc.attraction >= LOVE_EVENT_THRESHOLD) {
    npc.loveEventTriggered = true; // 立刻鎖定，避免同一角色因後續數值變動重複觸發
    pendingLoveEvent = npcId;
  }
}

const labels = { trust: "信任", respect: "尊重", attraction: "吸引", dependence: "依賴" };
const genderLabels = { male: "男", female: "女", other: "其他" };

// 調整 NPC 關係數值的共用函式：統一夾在 0~100 之間，
// 因為畫面上是直接把數值當百分比寬度顯示，超過100或低於0畫面會壞掉
function adjustRelation(npc, attribute, amount) {
  npc[attribute] = Math.max(0, Math.min(100, npc[attribute] + amount));
}

// NPC 數量上限，避免 AI 無節制生成新角色
const MAX_NPCS = 8;

// 新增 NPC 的把關函式：AI 只能提供姓名與身份，初始數值一律由系統給固定值，
// 避免 AI 生成的數值不穩定破壞遊戲平衡。驗證失敗時直接拒絕並在 console 留紀錄。
function addNewNpc(npcId, name, role) {
  if (typeof npcId !== 'string' || !/^[a-z0-9_]+$/i.test(npcId)) {
    console.warn('拒絕新增 NPC：npcId 格式不合法', npcId);
    return false;
  }
  if (npcs[npcId]) {
    console.warn('拒絕新增 NPC：id 已存在，避免覆蓋既有角色', npcId);
    return false;
  }
  if (typeof name !== 'string' || !name.trim() || typeof role !== 'string' || !role.trim()) {
    console.warn('拒絕新增 NPC：姓名或身份為空', name, role);
    return false;
  }
  if (Object.keys(npcs).length >= MAX_NPCS) {
    console.warn('拒絕新增 NPC：已達數量上限', MAX_NPCS);
    return false;
  }
  npcs[npcId] = {
    name: name.trim(), role: role.trim(),
    trust: 10, respect: 10, attraction: 0, dependence: 0,
    canRomance: false, loveEventTriggered: false // AI 動態生成的角色一律不可攻略，需由開發者手動開放
  };
  return true;
}

function switchTab(tabId, btnEl) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  btnEl.classList.add('active');
  if (tabId === 'quest') {
    questUpdatedFlag = false;
    document.getElementById('quest-badge').style.display = 'none';
  }
  if (tabId === 'story') {
    storyUpdatedFlag = false;
    document.getElementById('story-badge').style.display = 'none';
  }
}

function createPlayer() {
  const nameInput = document.getElementById('player-name');
  const name = nameInput.value.trim();
  if (!name) {
    nameInput.focus();
    return;
  }
  player.name = name;
  player.gender = document.getElementById('player-gender').value;

  document.getElementById('create-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('player-header').innerText = `${player.name}`;

  render();
}

function renderMiniQuestBar() {
  const el = document.getElementById('mini-quest-bar');
  // 這裡故意不用 getActiveQuest()：getActiveQuest 是「還能不能被推進」的判斷（全部完成時回傳null），
  // 但這裡是「顯示用」，主線全部結束、沒有支線時，畫面還是要保留主線的「已完成」狀態，不能整塊消失
  const activeSide = quests.find(q => q.type === "side" && q.status === "active");
  const targetQuest = activeSide || getMainQuest();
  if (!targetQuest) { el.innerHTML = ''; return; }
  const pct = Math.min(100, (targetQuest.progress / targetQuest.maxProgress) * 100);
  el.innerHTML = `
    <div class="mini-quest-bar">
      <div class="mini-quest-label"><span>${targetQuest.title}</span><span>${targetQuest.progress} / ${targetQuest.maxProgress}</span></div>
      <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
}

function renderMiniCase() {
  const el = document.getElementById('mini-case-card');
  const foundCount = caseFile.clues.filter(c => c.found).length;
  const total = caseFile.clues.length;
  const allFound = foundCount === total;

  let statusHtml = '';
  if (caseClosed) {
    statusHtml = '<div class="quest-status">已結案</div>';
  } else if (isGenerating) {
    statusHtml = '<div class="loading">生成中，請稍候...</div>';
  } else if (allFound) {
    statusHtml = '<button onclick="resolveCase()">向顧承夜回報，結案</button>';
  }

  el.innerHTML = `
    <div class="mini-quest-bar">
      <div class="mini-quest-label"><span>${caseFile.title}</span><span>${foundCount} / ${total} 線索</span></div>
      ${statusHtml}
    </div>`;
}

function renderQuest() {
  const el = document.getElementById('quest-card');
  const typeLabels = { main: "主線", side: "支線" };
  el.innerHTML = quests.map(q => {
    const pct = Math.min(100, (q.progress / q.maxProgress) * 100);
    const done = q.status === "completed";
    return `
    <div class="card">
      <h2>${q.title}<span style="font-size:12px; color:#7aa2f7; margin-left:8px;">${typeLabels[q.type] || q.type}</span></h2>
      <div class="bar-row">
        <div class="bar-label"><span>進度</span><span>${q.progress} / ${q.maxProgress}</span></div>
        <div class="bar-bg"><div class="bar-fill quest" style="width:${pct}%"></div></div>
      </div>
      ${done ? '<div class="quest-status">任務完成</div>' : ''}
    </div>`;
  }).join('');
}

function renderCase() {
  const el = document.getElementById('case-card');
  const allFound = caseFile.clues.every(c => c.found);
  const cluesHtml = caseFile.clues.map(c =>
    `<li class="${c.found ? 'found' : ''}">${c.found ? c.title : '未知線索'}</li>`
  ).join('');

  let actionHtml = '';
  if (caseClosed) {
    actionHtml = '<div class="quest-status">已結案</div>';
  } else if (isGenerating) {
    actionHtml = '<div class="loading">生成中，請稍候...</div>';
  } else if (allFound) {
    actionHtml = `<div class="quest-status">線索齊全</div><button onclick="resolveCase()">向顧承夜回報，結案</button>`;
  } else {
    actionHtml = `<button onclick="searchClue()">搜查線索</button>`;
  }

  el.innerHTML = `
    <div class="card">
      <h2>${caseFile.title}</h2>
      <ul class="clue-list">${cluesHtml}</ul>
      ${actionHtml}
    </div>`;
}

function render() {
  renderQuest();
  renderCase();
  renderMiniQuestBar();
  renderMiniCase();

  const questBadge = document.getElementById('quest-badge');
  const isQuestTabActive = document.getElementById('tab-quest').classList.contains('active');
  questBadge.style.display = (questUpdatedFlag && !isQuestTabActive) ? 'inline-block' : 'none';

  const storyBadge = document.getElementById('story-badge');
  const isStoryTabActive = document.getElementById('tab-story').classList.contains('active');
  storyBadge.style.display = (storyUpdatedFlag && !isStoryTabActive) ? 'inline-block' : 'none';

  const container = document.getElementById('npc-cards');
  container.innerHTML = '';
  for (const id in npcs) {
    const npc = npcs[id];
    let barsHtml = '';
    for (const key in labels) {
      barsHtml += `
        <div class="bar-row">
          <div class="bar-label"><span>${labels[key]}</span><span>${npc[key]}</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${npc[key]}%"></div></div>
        </div>`;
    }
    container.innerHTML += `
      <div class="card">
        <h2>${npc.name}</h2>
        <p style="color:#888; font-size:13px;">${npc.role}</p>
        ${barsHtml}
        <button onclick="doAction('${id}', 'mission')">一起出任務</button>
        <button onclick="doAction('${id}', 'soothe')">精神疏導</button>
      </div>`;
  }

  const listEl = document.getElementById('timeline-list');
  listEl.innerHTML = timeline.map(t => `<li>Day ${t.day}：${t.event}</li>`).join('');
}

function doAction(npcId, type) {
  day++;
  const npc = npcs[npcId];
  if (type === 'mission') {
    adjustRelation(npc, 'trust', 5);
    adjustRelation(npc, 'respect', 2);
    const activeQuest = getActiveQuest();
    if (activeQuest) {
      updateQuestProgress(activeQuest.id, 1);
    }
    timeline.push({ day, event: `與${npc.name}一起出任務，案件調查推進` });
  } else if (type === 'soothe') {
    adjustRelation(npc, 'attraction', 5);
    adjustRelation(npc, 'dependence', 3);
    checkLoveEventTrigger(npcId);
    timeline.push({ day, event: `為${npc.name}進行精神疏導` });
  }
  render();
  if (pendingLoveEvent) {
    const triggeredNpcId = pendingLoveEvent;
    pendingLoveEvent = null;
    triggerLoveEvent(triggeredNpcId);
  }
}

function searchClue() {
  const unfound = caseFile.clues.filter(c => !c.found);
  if (unfound.length === 0) return;
  day++;
  const pick = unfound[Math.floor(Math.random() * unfound.length)];
  pick.found = true;
  timeline.push({ day, event: `發現線索：${pick.title}` });
  render();
}

async function resolveCase() {
  if (isGenerating) return;
  const input = document.getElementById('ai-input');
  input.value = `我已經蒐集齊所有線索（${caseFile.clues.map(c => c.title).join('、')}），我要向顧承夜回報，準備結案`;
  await sendToAI();
  caseClosed = true;
  const mainQuest = getMainQuest();
  if (mainQuest) {
    updateQuestProgress(mainQuest.id, mainQuest.maxProgress - mainQuest.progress);
    mainQuest.status = "completed";
  }
  render();
}

// ---------- AI 串接 ----------

function buildWorldState() {
  return {
    day,
    player,
    quests,
    canTriggerNewQuest: canTriggerNewQuest(),
    caseFile,
    npcs
  };
}

async function sendToAI(loveEventNpcId) {
  if (isGenerating) return;
  const input = document.getElementById('ai-input');
  const statusEl = document.getElementById('ai-status');
  const text = input.value.trim();
  if (!text) return;
  const isLoveEvent = !!loveEventNpcId;

  isGenerating = true;
  statusEl.innerHTML = '<div class="loading">生成中...</div>';
  input.disabled = true;
  render(); // 立即讓案件卡／任務卡的按鈕切換成「生成中」狀態

  const worldState = buildWorldState();

  const npcIntro = Object.values(npcs).map(n => `${n.name}是${n.role}`).join('，');

  const recentLogText = recentStoryLog.length > 0
    ? `\n最近幾輪劇情脈絡（依時間順序排列，用來判斷「他/她」等代名詞指涉對象、保持人物與情節連貫，不要重複描述這些內容）：\n${recentStoryLog.join('\n---\n')}\n`
    : '';

  const systemPrompt = `你是一個文字小說模擬器的敘事引擎，世界觀是現代都市哨兵嚮導題材。
玩家角色姓名是「${player.name}」，性別為${genderLabels[player.gender]}，是B級嚮導，${player.background}。
目前已登場的NPC：${npcIntro}。
${recentLogText}
請用第二人稱「你」作為敘事視角，但其他角色對話中應該會直接稱呼玩家的姓名「${player.name}」，而不是只喊「你」。

目前世界狀態（JSON）：
${JSON.stringify(worldState)}

玩家輸入的行動：「${text}」

請根據世界狀態與玩家行動，生成一段150字以內的繁體中文劇情敘述，並判斷這個行動應該造成哪些數值變化。

只回傳純JSON，不要任何前言、不要markdown符號、不要程式碼區塊標記，格式必須是：
{
  "story": "劇情文字",
  "summary": "15字以內的事件摘要，用於世界年表記錄",
  "worldUpdates": [
    { "type": "relation", "npcId": "guchengye 或 qinyao", "attribute": "trust 或 respect 或 attraction 或 dependence", "amount": 數字（可正可負） },
    { "type": "quest", "questId": "quests 陣列裡對應任務的 id", "amount": 數字（可正可負） },
    { "type": "clue", "clueIndex": "caseFile.clues 陣列中的索引（從0開始），必須選一個 found 為 false、且內容與這次劇情最相關的線索，不要隨便選第一個" },
    { "type": "new_npc", "npcId": "新角色的英文/拼音代稱，需唯一，只能用英文字母數字底線", "name": "新角色姓名", "role": "身份定位，例如：哨兵、嚮導、塔內部人員等" },
    { "type": "new_quest", "title": "新支線任務的標題", "maxProgress": 完成這條支線大約需要幾次互動推進，建議3到10之間的整數 }
  ]
}
worldUpdates 陣列可以是空陣列，也可以包含多筆。如果行動與案件無關，就不要加 quest 或 clue 類型。
new_npc 只能在劇情明確讓一位「全新的、有名有姓」的角色登場並產生互動時才使用，不要每次對話都生成新角色，也不要重複生成已經存在於目前 NPC 清單中的角色。
new_quest 只能在世界狀態的 canTriggerNewQuest 為 true、且劇情發展合理地帶出一個新的調查方向或委託時才使用；如果 canTriggerNewQuest 為 false，絕對不要提出新任務，即使劇情看起來很適合開新支線。`;

  const loveEventPrompt = isLoveEvent ? `

【心動事件特別敘事規則】這是${npcs[loveEventNpcId].name}與${player.name}之間跨越日常界線的心動時刻，敘事必須遵守：
- 嚴禁使用強調權力、控制、壓迫或性別刻板印象的詞彙，也嚴禁現代科技或機械化詞彙。
- 情緒轉折要透過角色對場景中「實體物件」或「肌理觸感」的互動來呈現，不要直接說明心理狀態。
- 即使表面冷靜克制，也要透露細微、不易察覺的真實情緒波動，不能單向壓迫或被動附和。
- 結尾不要做情感總結或收束語句，保留發展性與感官餘韻。
- 避免用「……」或連續句號製造停頓，也避免用「」［］（）強調詞語重點。` : '';

  const finalSystemPrompt = systemPrompt + loveEventPrompt;

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: finalSystemPrompt }] }]
        })
      }
    );

    const data = await response.json();
    if (data.error) {
      throw new Error(data.error.message);
    }
    let rawText = data.candidates[0].content.parts[0].text;
    rawText = rawText.replace(/```json|```/g, "").trim();
    const result = JSON.parse(rawText);

    document.getElementById('story-box').innerText = result.story;

    recentStoryLog.push(`玩家行動：${text}\n劇情結果：${result.story}`);
    if (recentStoryLog.length > MAX_RECENT_TURNS) {
      recentStoryLog.shift();
    }

    day++;
    const eventLabel = isLoveEvent ? `${npcs[loveEventNpcId].name}心動時刻` : (result.summary || text);
    timeline.push({ day, event: eventLabel });
    if (isLoveEvent) {
      storyUpdatedFlag = true; // 心動事件可能是在角色分頁被觸發，提醒玩家回劇情分頁查看
    }

    (result.worldUpdates || []).forEach(u => {
      if (isLoveEvent && u.type !== 'relation') return; // 心動事件是獨立過場，不應該夾帶案件或任務的進度變化
      if (u.type === 'relation' && npcs[u.npcId] && labels[u.attribute] !== undefined) {
        adjustRelation(npcs[u.npcId], u.attribute, u.amount);
        if (u.attribute === 'attraction') checkLoveEventTrigger(u.npcId);
      } else if (u.type === 'quest') {
        // AI 若沒有正確帶 questId，先退回操作主線任務，避免整個更新被吃掉
        const targetId = u.questId || (getMainQuest() && getMainQuest().id);
        if (targetId) updateQuestProgress(targetId, u.amount);
      } else if (u.type === 'clue') {
        let target = null;
        if (typeof u.clueIndex === 'number' && caseFile.clues[u.clueIndex] && !caseFile.clues[u.clueIndex].found) {
          target = caseFile.clues[u.clueIndex];
        } else {
          // AI 沒給正確索引時，退回抓第一個未找到的線索，避免整筆更新被吃掉
          target = caseFile.clues.find(c => !c.found);
        }
        if (target) target.found = true;
      } else if (u.type === 'new_npc') {
        addNewNpc(u.npcId, u.name, u.role);
      } else if (u.type === 'new_quest') {
        addNewQuest(u.title, u.maxProgress);
      }
    });

    statusEl.innerHTML = '';
    input.value = '';
    render();
  } catch (err) {
    statusEl.innerHTML = `<div class="loading">發生錯誤，請重試：${err.message}</div>`;
    console.error(err);
  } finally {
    input.disabled = false;
    isGenerating = false;
    render();
    if (pendingLoveEvent) {
      const triggeredNpcId = pendingLoveEvent;
      pendingLoveEvent = null;
      triggerLoveEvent(triggeredNpcId);
    }
  }
}

// 心動事件過場：延用 resolveCase 的做法，組一段描述情境的文字，
// 直接交給既有的 sendToAI 生成專屬劇情，不另外開一套 AI 呼叫邏輯
async function triggerLoveEvent(npcId) {
  const npc = npcs[npcId];
  if (!npc) return;
  const input = document.getElementById('ai-input');
  input.value = `${player.name}忽然意識到，自己看待${npc.name}的眼神與心情，已經和從前不一樣了`;
  await sendToAI(npcId);
}
</script>
