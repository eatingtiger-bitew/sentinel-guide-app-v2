<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>哨兵嚮導原型 v0.5</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #111; color: #eee; padding: 20px; max-width: 480px; margin: auto; }
  .card { background: #1e1e1e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  h2 { margin-top: 0; font-size: 18px; }
  .bar-row { margin: 8px 0; }
  .bar-label { font-size: 13px; color: #aaa; display: flex; justify-content: space-between; }
  .bar-bg { background: #333; border-radius: 6px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; background: #7aa2f7; transition: width 0.3s; }
  .bar-fill.quest { background: #6cbf7f; }
  button { background: #2b2b3d; color: #eee; border: none; padding: 10px 14px; border-radius: 8px; margin-right: 8px; margin-top: 10px; cursor: pointer; }
  button:hover { background: #3b3b52; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #timeline-list { font-size: 14px; color: #ccc; padding-left: 18px; }
  .quest-status { font-size: 13px; color: #6cbf7f; margin-top: 6px; }
  .clue-list { list-style: none; padding: 0; margin: 10px 0 0 0; }
  .clue-list li { font-size: 14px; padding: 6px 0; border-bottom: 1px solid #2a2a2a; color: #666; }
  .clue-list li.found { color: #eee; }
  .clue-list li.found::before { content: "✓ "; color: #6cbf7f; }
  .clue-list li:not(.found)::before { content: "? "; color: #555; }
  #story-box { min-height: 60px; font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
  #ai-input { width: 100%; box-sizing: border-box; background: #2b2b3d; color: #eee; border: none; border-radius: 8px; padding: 10px; font-size: 14px; margin-top: 8px; }
  .loading { color: #888; font-size: 13px; }
</style>
</head>
<body>

<div class="card">
  <h2>劇情</h2>
  <div id="story-box">輸入你想做的事,故事會從這裡展開。</div>
  <input id="ai-input" type="text" placeholder="例如：我想去找顧承夜討論案情">
  <button onclick="sendToAI()">送出</button>
  <div id="ai-status"></div>
</div>

<div id="quest-card"></div>
<div id="case-card"></div>
<div id="npc-cards"></div>

<div class="card">
  <h2>世界年表</h2>
  <ol id="timeline-list"></ol>
</div>

<script>
// ⚠️ 這是原型階段暫用寫法，金鑰會暴露在前端，正式上線前必須換成後端保管
const GEMINI_API_KEY = "AQ.Ab8RN6LaDRK33_7P06k9bDBwBlW7T1xv4dSgQGRFLnf_FJu7Sw";
const GEMINI_MODEL = "gemini-2.5-flash";

let day = 1;
let timeline = [];

let quest = {
  title: "異常精神波事件調查案",
  progress: 0,
  maxProgress: 8
};

let caseFile = {
  title: "案件調查：異常精神波事件",
  clues: [
    { title: "現場遺留的精神殘留波紋", found: false },
    { title: "受害者最後聯絡紀錄", found: false },
    { title: "目擊者描述的黑影特徵", found: false },
    { title: "塔內部的異常任務派遣紀錄", found: false }
  ]
};

let npcs = {
  guchengye: {
    name: "顧承夜",
    role: "S 級哨兵・特勤隊長",
    trust: 15, respect: 30, attraction: 5, dependence: 0
  },
  qinyao: {
    name: "秦曜",
    role: "哨兵",
    trust: 10, respect: 60, attraction: 5, dependence: 0
  }
};

const labels = { trust: "信任", respect: "尊重", attraction: "吸引", dependence: "依賴" };

function renderQuest() {
  const el = document.getElementById('quest-card');
  const pct = Math.min(100, (quest.progress / quest.maxProgress) * 100);
  const done = quest.progress >= quest.maxProgress;
  el.innerHTML = `
    <div class="card">
      <h2>${quest.title}</h2>
      <div class="bar-row">
        <div class="bar-label"><span>進度</span><span>${quest.progress} / ${quest.maxProgress}</span></div>
        <div class="bar-bg"><div class="bar-fill quest" style="width:${pct}%"></div></div>
      </div>
      ${done ? '<div class="quest-status">任務完成</div>' : ''}
    </div>`;
}

function renderCase() {
  const el = document.getElementById('case-card');
  const allFound = caseFile.clues.every(c => c.found);
  const cluesHtml = caseFile.clues.map(c =>
    `<li class="${c.found ? 'found' : ''}">${c.found ? c.title : '未知線索'}</li>`
  ).join('');
  el.innerHTML = `
    <div class="card">
      <h2>${caseFile.title}</h2>
      <ul class="clue-list">${cluesHtml}</ul>
      <button onclick="searchClue()" ${allFound ? 'disabled' : ''}>搜查線索</button>
      ${allFound ? '<div class="quest-status">線索齊全</div>' : ''}
    </div>`;
}

function render() {
  renderQuest();
  renderCase();

  const container = document.getElementById('npc-cards');
  container.innerHTML = '';
  for (const id in npcs) {
    const npc = npcs[id];
    let barsHtml = '';
    for (const key in labels) {
      barsHtml += `
        <div class="bar-row">
          <div class="bar-label"><span>${labels[key]}</span><span>${npc[key]}</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${npc[key]}%"></div></div>
        </div>`;
    }
    container.innerHTML += `
      <div class="card">
        <h2>${npc.name}</h2>
        <p style="color:#888; font-size:13px;">${npc.role}</p>
        ${barsHtml}
        <button onclick="doAction('${id}', 'mission')">一起出任務</button>
        <button onclick="doAction('${id}', 'soothe')">精神疏導</button>
      </div>`;
  }

  const listEl = document.getElementById('timeline-list');
  listEl.innerHTML = timeline.map(t => `<li>Day ${t.day}：${t.event}</li>`).join('');
}

function doAction(npcId, type) {
  day++;
  const npc = npcs[npcId];
  if (type === 'mission') {
    npc.trust += 5;
    npc.respect += 2;
    if (quest.progress < quest.maxProgress) {
      quest.progress += 1;
    }
    timeline.push({ day, event: `與${npc.name}一起出任務，案件調查推進` });
  } else if (type === 'soothe') {
    npc.attraction += 5;
    npc.dependence += 3;
    timeline.push({ day, event: `為${npc.name}進行精神疏導` });
  }
  render();
}

function searchClue() {
  const unfound = caseFile.clues.filter(c => !c.found);
  if (unfound.length === 0) return;
  day++;
  const pick = unfound[Math.floor(Math.random() * unfound.length)];
  pick.found = true;
  timeline.push({ day, event: `發現線索：${pick.title}` });
  render();
}

// ---------- AI 串接 ----------

function buildWorldState() {
  return {
    day,
    quest,
    caseFile,
    npcs
  };
}

async function sendToAI() {
  const input = document.getElementById('ai-input');
  const statusEl = document.getElementById('ai-status');
  const text = input.value.trim();
  if (!text) return;

  statusEl.innerHTML = '<div class="loading">生成中...</div>';
  input.disabled = true;

  const worldState = buildWorldState();

  const systemPrompt = `你是一個文字小說模擬器的敘事引擎，世界觀是現代都市哨兵嚮導題材。
玩家是一名B級嚮導，NPC顧承夜是S級哨兵特勤隊長，秦曜是哨兵。

目前世界狀態（JSON）：
${JSON.stringify(worldState)}

玩家輸入的行動：「${text}」

請根據世界狀態與玩家行動，生成一段150字以內的繁體中文劇情敘述，並判斷這個行動應該造成哪些數值變化。

只回傳純JSON，不要任何前言、不要markdown符號、不要程式碼區塊標記，格式必須是：
{
  "story": "劇情文字",
  "worldUpdates": [
    { "type": "relation", "npcId": "guchengye 或 qinyao", "attribute": "trust 或 respect 或 attraction 或 dependence", "amount": 數字（可正可負） },
    { "type": "quest", "amount": 數字（可正可負） },
    { "type": "clue" }
  ]
}
worldUpdates 陣列可以是空陣列，也可以包含多筆。如果行動與案件無關，就不要加 quest 或 clue 類型。`;

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: systemPrompt }] }]
        })
      }
    );

    const data = await response.json();
    if (data.error) {
      throw new Error(data.error.message);
    }
    let rawText = data.candidates[0].content.parts[0].text;
    rawText = rawText.replace(/```json|```/g, "").trim();
    const result = JSON.parse(rawText);

    document.getElementById('story-box').innerText = result.story;

    day++;
    timeline.push({ day, event: text });

    (result.worldUpdates || []).forEach(u => {
      if (u.type === 'relation' && npcs[u.npcId] && labels[u.attribute] !== undefined) {
        npcs[u.npcId][u.attribute] += u.amount;
      } else if (u.type === 'quest') {
        quest.progress = Math.max(0, Math.min(quest.maxProgress, quest.progress + u.amount));
      } else if (u.type === 'clue') {
        const unfound = caseFile.clues.filter(c => !c.found);
        if (unfound.length > 0) {
          unfound[0].found = true;
        }
      }
    });

    statusEl.innerHTML = '';
    input.value = '';
    render();
  } catch (err) {
    statusEl.innerHTML = `<div class="loading">發生錯誤，請重試：${err.message}</div>`;
    console.error(err);
  } finally {
    input.disabled = false;
  }
}

render();
</script>

</body>
</html>
